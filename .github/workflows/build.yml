# ============================================================
# HoloPhysics Lab 2 — CI/CD Pipeline v2 (исправленная)
# ============================================================

name: HoloPhysics Lab 2 CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release
  CTEST_OUTPUT_ON_FAILURE: ON

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --fix-missing \
          libgl1-mesa-dev libglu1-mesa-dev \
          libxinerama-dev libxcursor-dev libxi-dev \
          libxrandr-dev libxxf86vm-dev \
          mesa-utils xvfb \
          cmake ninja-build g++-12

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      id: vcpkg
      with:
        vcpkgJsonGlob: vcpkg.json
        runVcpkgInstall: true

    - name: Configure CMake
      run: |
        cmake -B build -G "Ninja" \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DBUILD_TESTS=ON \
          -DUSE_OPENCV=OFF \
          -DUSE_SANITIZERS=OFF

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel $(nproc)

    - name: Run Tests
      run: |
        cd build
        xvfb-run ctest --output-on-failure --timeout 60

    - name: Upload Artifacts
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: HoloPhysicsLab2-Linux
        path: build/HoloPhysicsLab2

  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      id: vcpkg
      with:
        vcpkgJsonGlob: vcpkg.json
        runVcpkgInstall: true
        vcpkgDirectory: ${{ runner.workspace }}/b/vcpkg

    - name: Configure CMake
      run: |
        cmake -B build -G "Visual Studio 17 2022" `
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
          -DBUILD_TESTS=ON `
          -DUSE_OPENCV=OFF

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Run Tests
      run: |
        cd build
        ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 60

    - name: Upload Artifacts
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: HoloPhysicsLab2-Windows
        path: build/Release/*.exe

  # Sanitizer без установки clang — используем gcc
  sanitizer:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --fix-missing \
          libgl1-mesa-dev xvfb \
          cmake ninja-build g++-12

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      id: vcpkg
      with:
        vcpkgJsonGlob: vcpkg.json
        runVcpkgInstall: true

    - name: Configure CMake (ASAN)
      run: |
        cmake -B build-asan -G "Ninja" \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_TESTS=ON \
          -DUSE_SANITIZERS=ON \
          -DUSE_OPENCV=OFF

    - name: Build
      run: cmake --build build-asan --config Debug --parallel $(nproc)

    - name: Run Tests with ASAN
      run: |
        cd build-asan
        xvfb-run ctest --output-on-failure --timeout 120
      env:
        ASAN_OPTIONS: detect_leaks=1:suppressions=${{ github.workspace }}/asan.supp:halt_on_error=1

  lint:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Install cppcheck
      run: sudo apt-get update && sudo apt-get install -y cppcheck
    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,performance \
          --suppress=missingIncludeSystem \
          --error-exitcode=1 \
          --inline-suppr \
          --suppress=unmatchedSuppression \
          src/ 2>&1 || echo "cppcheck завершился с предупреждениями"
