name: HoloPhysics Lab 2 CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

env:
  BUILD_TYPE: Release
  CTEST_OUTPUT_ON_FAILURE: ON

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Install vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg --depth 1
        C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
        echo "C:\vcpkg" >> $env:GITHUB_PATH

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: C:/vcpkg/packages
        key: vcpkg-${{ runner.os }}-${{ hashFiles("CMakeLists.txt")

    - name: Install deps
      run: vcpkg install --triplet x64-windows glfw3 glad glm imgui[docking-experimental,glfw-binding,opengl3-binding] implot nlohmann-json catch2

    - name: Configure
      run: cmake -B build -G "Visual Studio 17 2022" -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build --config $env:BUILD_TYPE --parallel

    - name: Test
      run: cd build && ctest -C $env:BUILD_TYPE --output-on-failure --timeout 60
